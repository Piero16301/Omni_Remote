name: Open Test
# CI workflow for Saver Expense Manager application.
# This workflow checks the commit author, runs semantic checks, spell checks,
# executes tests, builds the application, and deploys it to the Play Store
# on the 'dev' branch. The application is deployed to the open test track.

concurrency:
  group: dev-$-$
  cancel-in-progress: true

on:
  push:
    branches:
      - dev

jobs:
  semantic-pull-request:
    name: "📝 Semantic"
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1
    permissions:
      contents: read

  spell-check:
    name: "🔍 Spell Check"
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false

  quality:
    name: "💯 Verify Quality Gates"
    needs: [semantic-pull-request, spell-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: 📦 Install Dependencies
        run: |
          flutter pub get
      - name: ✨ Format Check
        run: |
          dart format --set-exit-if-changed .
      - name: 🧐 Analyze
        run: |
          flutter analyze
      - name: 🧪 Run Tests
        run: |
          flutter test --coverage
      - name: ✅ Check Coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
      - name: 📊 Codecov Badge
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-android:
    name: "🔨 Build Android AAB"
    needs: quality
    runs-on: ubuntu-latest
    env:
      APP_PACKAGE_NAME: com.pmorales.omni.remote
      AAB_PATH: build/app/outputs/bundle/productionRelease/app-production-release.aab
      KEYSTORE_PATH: android/keystore.jks
      KEY_PROPS_PATH: android/key.properties
      SERVICE_ACCOUNT_PATH: service-account.json
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: 🔑 Decode Android Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ env.KEYSTORE_PATH }}
      - name: 🔑 Decode Android Key Properties
        run: echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" | base64 --decode > ${{ env.KEY_PROPS_PATH }}
      - name: 🔑 Decode Service Account
        run: echo "${{ secrets.ANDROID_RELEASE_SERVICE_ACCOUNT }}" | base64 --decode > ${{ env.SERVICE_ACCOUNT_PATH }}

      - name: 📦 Install Dependencies
        run: |
          flutter pub get
      - name: 🛠️ Build the application (AAB)
        run: |
          flutter build appbundle --flavor production -t lib/main.dart

      - name: ⬇️ Upload AAB to Artifacts
        uses: actions/upload-artifact@master
        with:
          name: aab-stores
          path: ${{ env.AAB_PATH }}

  deploy-android:
    name: "🚀 Deploy to Play Store (Open Test)"
    runs-on: ubuntu-latest
    needs: build-android
    env:
      APP_PACKAGE_NAME: com.pmorales.omni.remote
      AAB_PATH: build/app/outputs/bundle/productionRelease/app-production-release.aab
      SERVICE_ACCOUNT_PATH: service-account.json
    steps:
      - name: 📚 Checkout repo
        uses: actions/checkout@v6
      - name: ⬇️ Download Artifact
        uses: actions/download-artifact@master
        with:
          name: aab-stores
          path: ./downloaded
      - name: 📁 Crear estructura de directorios
        run: |
          mkdir -p build/app/outputs/bundle/productionRelease/
          cp ./downloaded/* build/app/outputs/bundle/productionRelease/
          ls -la build/app/outputs/bundle/productionRelease/
      - name: 🔑 Decode Service Account
        run: echo "${{ secrets.ANDROID_RELEASE_SERVICE_ACCOUNT }}" | base64 --decode > ${{ env.SERVICE_ACCOUNT_PATH }}          
      - name: 🚀 Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.SERVICE_ACCOUNT_PATH }}
          packageName: ${{ env.APP_PACKAGE_NAME }}
          releaseFiles: ${{ env.AAB_PATH }}
          track: beta # production, alpha, qa | automotive, wear, tv, android_xr, google_play_games_pc
          whatsNewDirectory: whatsnew
          # userFraction: 0.1
