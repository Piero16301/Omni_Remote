name: Production
# CI workflow for Omni Remote application.
# This workflow checks the commit author, runs semantic checks, spell checks,
# executes tests, builds the application, and deploys it to the Play Store
# on the 'main' branch. The application is deployed to the Android production track.

concurrency:
  group: main-$-$
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  check-commit-type:
    name: "🔍 Check Commit Type"
    runs-on: ubuntu-latest
    outputs:
      is_dev_merge: ${{ steps.check_commit.outputs.is_dev_merge }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if commit is merge from dev
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == "Merge pull request"* && "$COMMIT_MSG" == *"from Piero16301/dev" ]]; then
            echo "is_dev_merge=true" >> $GITHUB_OUTPUT
            echo "Commit is a merge from dev branch, continuing with workflow"
          else
            echo "is_dev_merge=false" >> $GITHUB_OUTPUT
            echo "Commit is not a merge from dev branch, skipping workflow"
          fi

  semantic-pull-request:
    name: "📝 Semantic"
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1
    permissions:
      contents: read

  spell-check:
    name: "🔍 Spell Check"
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false

  quality:
    name: "💯 Verify Quality Gates"
    needs: [semantic-pull-request, spell-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: 📦 Install Dependencies
        run: |
          flutter pub get
      - name: ✨ Format Check
        run: |
          dart format --set-exit-if-changed .
      - name: 🧐 Analyze
        run: |
          flutter analyze
      - name: 🧪 Run Tests
        run: |
          flutter test --coverage
      - name: ✅ Check Coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
      - name: 📊 Codecov Badge
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  promote:
    name: "📈 Promote to Production"
    needs: quality
    runs-on: ubuntu-latest
    env:
      APP_PACKAGE_NAME: com.pmorales.omni.remote
      SERVICE_ACCOUNT_PATH: service-account.json
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6
      - name: 🔑 Decode Service Account
        run: echo "${{ secrets.ANDROID_RELEASE_SERVICE_ACCOUNT }}" | base64 --decode > ${{ env.SERVICE_ACCOUNT_PATH }}
      - name: 🚀 Promote to Production
        uses: kevin-david/promote-play-release@v1.2.0
        with:
          service-account-json-file: ${{ env.SERVICE_ACCOUNT_PATH }}
          package-name: ${{ env.APP_PACKAGE_NAME }}
          from-track: 'beta'
          to-track: 'production'