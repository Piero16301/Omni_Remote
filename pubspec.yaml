name: omni_remote
description: Application to send and receive data from Arduino and ESP boards using a broker and custom MQTT topics.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.35.6"

dependencies:
  bloc: ^9.2.0                        # | Android | iOS | Linux | macOS | Web | Windows
  country_flags: ^4.1.2               # | Android | iOS | Linux | macOS |     | Windows
  equatable: ^2.0.8                   # | Android | iOS | Linux | macOS | Web | Windows
  firebase_analytics: ^12.3.0         # | Android | iOS |       | macOS | Web |
  firebase_core: ^4.7.0               # | Android | iOS |       | macOS | Web | Windows
  firebase_crashlytics: ^5.2.0        # | Android | iOS |       | macOS |     |
  firebase_performance: ^0.11.3       # | Android | iOS |       |       | Web |
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1                # | Android | iOS | Linux | macOS | Web | Windows
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.1                      # | Android | iOS | Linux | macOS | Web | Windows
  go_router: ^17.2.1                  # | Android | iOS | Linux | macOS | Web | Windows
  hive: ^2.2.3                        # | Android | iOS | Linux | macOS | Web | Windows
  hive_flutter: ^1.1.0                # | Android | iOS | Linux | macOS | Web | Windows
  hugeicons: ^1.1.6                   # | Android | iOS | Linux | macOS | Web | Windows
  intl: ^0.20.2                       # | Android | iOS | Linux | macOS | Web | Windows
  mqtt_client: ^10.11.10              # | Android | iOS | Linux | macOS | Web | Windows
  package_info_plus: ^10.0.0          # | Android | iOS | Linux | macOS | Web | Windows
  typed_data: ^1.4.0                  # | Android | iOS | Linux | macOS | Web | Windows
  uuid: ^4.5.3                        # | Android | iOS | Linux | macOS | Web | Windows

dev_dependencies:
  bloc_test: ^10.0.0                  # | Android | iOS | Linux | macOS | Web | Windows
  flutter_launcher_icons: ^0.14.4     # | Android | iOS | Linux | macOS | Web | Windows
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4                     # | Android | iOS | Linux | macOS | Web | Windows
  mocktail: ^1.0.5                    # | Android | iOS | Linux | macOS | Web | Windows
  very_good_analysis: ^10.2.0         # | Android | iOS | Linux | macOS | Web | Windows

flutter_launcher_icons:
  android: true
  image_path_android: "assets/images/app-main-logo-rounded.png"
  adaptive_icon_background: "#145EB9"
  adaptive_icon_foreground: "assets/images/app-main-logo-rounded.png"
  ios: true
  image_path_ios: "assets/images/app-main-logo-rounded.png"
  remove_alpha_ios: true
  background_color_ios: "#145EB9"
  web:
    generate: true
    image_path: "assets/images/logo-web.png"
    background_color: "transparent"
  windows:
   generate: true
   image_path: "assets/images/logo-windows.png"
   icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/logo-macos.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Regular.ttf
        - asset: assets/fonts/Merriweather-Medium.ttf
          weight: 500
        - asset: assets/fonts/Merriweather-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Medium.ttf
          weight: 500
        - asset: assets/fonts/Orbitron-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
